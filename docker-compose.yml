version: "3.9"

services:

  postgres:
    image: postgres:16-alpine
    container_name: interview-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres/init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [interview-net]

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: userdb
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8081:8081"
    networks: [interview-net]

  resume-service:
    build:
      context: .
      dockerfile: resume-service/Dockerfile
    container_name: resume-service
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: resumedb
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      RESUME_STORAGE_PATH: /data/resumes
    volumes:
      - resumes:/data/resumes
    ports:
      - "8082:8082"
    networks: [interview-net]

  interview-service:
    build:
      context: .
      dockerfile: interview-service/Dockerfile
    container_name: interview-service
    depends_on:
      postgres:
        condition: service_healthy
      resume-service:
        condition: service_started
      user-service:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: interviewdb
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      RESUME_SERVICE_URL: http://resume-service:8082
      USER_SERVICE_URL: http://user-service:8081
    ports:
      - "8083:8083"
    networks: [interview-net]

  feedback-service:
    build:
      context: .
      dockerfile: feedback-service/Dockerfile
    container_name: feedback-service
    depends_on:
      postgres:
        condition: service_healthy
      interview-service:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: feedbackdb
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      INTERVIEW_SERVICE_URL: http://interview-service:8083
    ports:
      - "8084:8084"
    networks: [interview-net]

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    depends_on:
      - user-service
      - resume-service
      - interview-service
      - feedback-service
    environment:
      USER_SERVICE_URL: http://user-service:8081
      RESUME_SERVICE_URL: http://resume-service:8082
      INTERVIEW_SERVICE_URL: http://interview-service:8083
      FEEDBACK_SERVICE_URL: http://feedback-service:8084
      JWT_SECRET: ${JWT_SECRET}
    ports:
      - "8080:8080"
    networks: [interview-net]

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    depends_on:
      - api-gateway
    ports:
      - "3000:80"
    networks: [interview-net]

  # ---- Observability stack (bonus, optional but on by default) ----

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    networks: [interview-net]

  prometheus:
    image: prom/prometheus:v2.54.1
    container_name: prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks: [interview-net]

  grafana:
    image: grafana/grafana:11.2.0
    container_name: grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks: [interview-net]

networks:
  interview-net:
    driver: bridge

volumes:
  pgdata:
  resumes:
  grafana-data:
