# ArgoCD Application pointing at the umbrella Helm chart.
# In real GitOps you'd put devops/helm/umbrella in its own "gitops" repo and
# have Jenkins bump image.tag there; here it points at this same repo/path
# to keep the deliverable self-contained.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: interview-platform
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<your-org>/interview-platform.git
    targetRevision: main
    path: devops/helm/umbrella
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: interview-platform
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 1m
