apiVersion: v2
name: interview-platform
description: Umbrella chart that installs the whole platform (5 backend charts + frontend) in one `helm install`. Each subchart is a thin wrapper around the shared "common" library chart — see devops/helm/common.
version: 1.0.0
dependencies:
  - name: user-service
    version: 1.0.0
    repository: "file://../charts/user-service"
    condition: user-service.enabled
  - name: resume-service
    version: 1.0.0
    repository: "file://../charts/resume-service"
    condition: resume-service.enabled
  - name: interview-service
    version: 1.0.0
    repository: "file://../charts/interview-service"
    condition: interview-service.enabled
  - name: feedback-service
    version: 1.0.0
    repository: "file://../charts/feedback-service"
    condition: feedback-service.enabled
  - name: api-gateway
    version: 1.0.0
    repository: "file://../charts/api-gateway"
    condition: api-gateway.enabled
  - name: frontend
    version: 1.0.0
    repository: "file://../charts/frontend"
    condition: frontend.enabled
