server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      routes:
        - id: user-service
          uri: ${USER_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/auth/**,/api/users/**
        - id: resume-service
          uri: ${RESUME_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/candidates/**
        - id: interview-service
          uri: ${INTERVIEW_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/interviews/**
        - id: feedback-service
          uri: ${FEEDBACK_SERVICE_URL:http://localhost:8084}
          predicates:
            - Path=/api/feedback/**

app:
  jwt:
    secret: ${JWT_SECRET:dev-only-change-me-interview-platform-secret-key-32bytes!}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,gateway
